<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>xvdevelopment — FiveM script development</title>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#142028" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e12" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0e12" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="#0a0e12"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  <rect width="1200" height="300" fill="url(#fade)"/>

  <line x1="0" y1="0" x2="1200" y2="0" stroke="#25fac0" stroke-width="2"/>

  <g transform="translate(64,52)">
    <circle cx="6" cy="6" r="6" fill="#2a3540"/>
    <circle cx="26" cy="6" r="6" fill="#2a3540"/>
    <circle cx="46" cy="6" r="6" fill="#2a3540"/>
    <text x="0" y="34" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="15" fill="#5a6b78">~/xvdevelopment/scripts</text>
  </g>

  <line x1="64" y1="64" x2="1136" y2="64" stroke="#1a2530" stroke-width="1"/>

  <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace">
    <text x="64" y="118" font-size="20" fill="#5a6b78">local developer = {</text>
    <text x="96" y="150" font-size="20" fill="#8b9bab">name <tspan fill="#5a6b78">=</tspan> <tspan fill="#25fac0">"xvdevelopment"</tspan>,</text>
    <text x="96" y="180" font-size="20" fill="#8b9bab">focus <tspan fill="#5a6b78">=</tspan> <tspan fill="#25fac0">"FiveM script development"</tspan>,</text>
    <text x="96" y="210" font-size="20" fill="#8b9bab">status <tspan fill="#5a6b78">=</tspan> <tspan fill="#25fac0">"accepting projects"</tspan></text>
    <text x="64" y="240" font-size="20" fill="#5a6b78">}</text>
  </g>

  <g transform="translate(64,260)">
    <rect x="0" y="0" width="9" height="18" fill="#25fac0">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <line x1="0" y1="299" x2="1200" y2="299" stroke="#25fac0" stroke-width="2"/>
</svg>
